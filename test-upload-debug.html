<!DOCTYPE html>
<html>
<head>
    <title>Debug Image Upload</title>
    <style>
        body {
            font-family: monospace;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        .log {
            background: #252526;
            padding: 10px;
            margin: 10px 0;
            border-left: 3px solid #007acc;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .error {
            border-left-color: #f48771;
            
        }
        .success {
            border-left-color: #89d185;
        }
        button {
            padding: 10px 20px;
            background: #007acc;
            color: white;
            border: none;
            cursor: pointer;
            margin: 10px 5px;
        }
        button:hover {
            background: #005a9e;
        }
        input[type="file"] {
            margin: 10px 0;
            padding: 10px;
            background: #252526;
            color: #d4d4d4;
            border: 1px solid #3e3e42;
        }
        img {
            max-width: 100%;
            margin-top: 10px;
            border: 2px solid #3e3e42;
        }
    </style>
</head>
<body>
    <h1>🔍 Image Upload Debugger</h1>
    
    <div>
        <input type="file" id="imageFile" accept="image/*" onchange="fileSelected()">
    </div>
    
    <button onclick="testUpload()">🚀 Test Upload</button>
    <button onclick="clearLogs()">🗑️ Clear Logs</button>
    
    <h2>Debug Logs:</h2>
    <div id="logs"></div>
    
    <script>
        let selectedFile = null;
        
        function log(message, type = 'info') {
            const logsDiv = document.getElementById('logs');
            const logEntry = document.createElement('div');
            logEntry.className = 'log ' + type;
            logEntry.textContent = new Date().toLocaleTimeString() + ' - ' + message;
            logsDiv.appendChild(logEntry);
            logsDiv.scrollTop = logsDiv.scrollHeight;
            console.log(message);
        }
        
        function fileSelected() {
            const fileInput = document.getElementById('imageFile');
            selectedFile = fileInput.files[0];
            
            if (selectedFile) {
                log('✅ File selected:', 'success');
                log(`   Name: ${selectedFile.name}`);
                log(`   Size: ${selectedFile.size} bytes (${(selectedFile.size / 1024).toFixed(2)} KB)`);
                log(`   Type: ${selectedFile.type}`);
                log(`   Last Modified: ${new Date(selectedFile.lastModified).toLocaleString()}`);
            } else {
                log('❌ No file selected', 'error');
            }
        }
        
        async function testUpload() {
            if (!selectedFile) {
                log('❌ ERROR: No file selected! Please select a file first.', 'error');
                return;
            }
            
            log('📦 Creating FormData...');
            const formData = new FormData();
            formData.append('image', selectedFile);
            
            log('📋 FormData contents:');
            for (let pair of formData.entries()) {
                log(`   ${pair[0]}: ${pair[1].name || pair[1]} (${pair[1].size || 0} bytes)`);
            }
            
            log('🌐 Sending request to: http://localhost:8000/api/projects/upload-image');
            log('   Method: POST');
            log('   Body: FormData with image');
            
            try {
                const startTime = Date.now();
                const response = await fetch('http://localhost:8000/api/projects/upload-image', {
                    method: 'POST',
                    body: formData
                });
                const endTime = Date.now();
                
                log(`⏱️ Request completed in ${endTime - startTime}ms`);
                log(`📊 Response Status: ${response.status} ${response.statusText}`);
                
                const responseText = await response.text();
                log('📄 Raw Response:');
                log(responseText);
                
                try {
                    const data = JSON.parse(responseText);
                    log('📦 Parsed JSON Response:');
                    log(JSON.stringify(data, null, 2));
                    
                    if (data.success) {
                        log('✅ UPLOAD SUCCESSFUL!', 'success');
                        log(`   URL: ${data.url}`);
                        log(`   Path: ${data.path}`);
                        
                        const img = document.createElement('img');
                        img.src = data.url;
                        img.alt = 'Uploaded image';
                        document.getElementById('logs').appendChild(img);
                    } else {
                        log('❌ UPLOAD FAILED!', 'error');
                        log(`   Message: ${data.message || 'Unknown error'}`);
                        if (data.errors) {
                            log(`   Errors: ${JSON.stringify(data.errors)}`);
                        }
                    }
                } catch (e) {
                    log('❌ Failed to parse JSON response', 'error');
                    log(`   Error: ${e.message}`);
                }
                
            } catch (error) {
                log('❌ NETWORK ERROR!', 'error');
                log(`   ${error.message}`);
                log('   Make sure the backend server is running on http://localhost:8000');
            }
        }
        
        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
            log('Logs cleared');
        }
        
        log('🎯 Upload debugger ready');
        log('👉 Step 1: Select an image file');
        log('👉 Step 2: Click "Test Upload" button');
    </script>
</body>
</html>
