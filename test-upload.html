<!DOCTYPE html>
<html>
<head>
    <title>Test Image Upload</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin: 20px 0;
        }
        button {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        img {
            max-width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Test Image Upload</h1>
    <p>This page tests the image upload endpoint directly.</p>
    
    <div class="form-group">
        <label>Select Image:</label><br>
        <input type="file" id="imageFile" accept="image/*">
    </div>
    
    <button onclick="uploadImage()">Upload Image</button>
    
    <div id="result"></div>
    
    <script>
        async function uploadImage() {
            const fileInput = document.getElementById('imageFile');
            const resultDiv = document.getElementById('result');
            
            if (!fileInput.files || !fileInput.files[0]) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = 'Please select an image file first!';
                return;
            }
            
            const file = fileInput.files[0];
            console.log('File selected:', file.name, 'Size:', file.size, 'Type:', file.type);
            
            const formData = new FormData();
            formData.append('image', file);
            
            // Log FormData contents
            for (let pair of formData.entries()) {
                console.log('FormData:', pair[0], pair[1]);
            }
            
            resultDiv.innerHTML = 'Uploading...';
            
            try {
                const response = await fetch('http://localhost:8000/api/projects/upload-image', {
                    method: 'POST',
                    body: formData
                });
                
                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Response data:', data);
                
                if (data.success) {
                    resultDiv.className = 'success';
                    resultDiv.innerHTML = `
                        <strong>Upload Successful!</strong><br>
                        URL: ${data.url}<br>
                        Path: ${data.path}<br>
                        <img src="${data.url}" alt="Uploaded image">
                    `;
                } else {
                    resultDiv.className = 'error';
                    resultDiv.innerHTML = `
                        <strong>Upload Failed!</strong><br>
                        ${data.message || 'Unknown error'}<br>
                        ${data.errors ? JSON.stringify(data.errors) : ''}
                    `;
                }
            } catch (error) {
                console.error('Error:', error);
                resultDiv.className = 'error';
                resultDiv.innerHTML = `<strong>Network Error!</strong><br>${error.message}`;
            }
        }
    </script>
</body>
</html>
